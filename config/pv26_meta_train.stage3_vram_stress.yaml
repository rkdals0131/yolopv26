dataset:
  root: ../seg_dataset/pv26_exhaustive_od_lane_dataset

run:
  run_root: ../runs/pv26_exhaustive_od_lane_train_stress
  run_name_prefix: stage3_vram_stress

train_defaults:
  device: cuda:0
  # Change this field when probing the maximum safe stage-3 batch size.
  batch_size: 40
  # Use a few optimizer steps so AdamW state and steady-state VRAM are exercised.
  train_batches: 30
  val_batches: 0
  trunk_lr: 0.0001
  head_lr: 0.005
  weight_decay: 0.0001
  schedule: none
  amp: true
  accumulate_steps: 1
  grad_clip_norm: 5.0
  val_every: 1
  checkpoint_every: 1
  num_workers: 6
  pin_memory: true
  log_every_n_steps: 1
  profile_window: 3
  profile_device_sync: true
  encode_train_batches_in_loader: true
  encode_val_batches_in_loader: true
  persistent_workers: true
  prefetch_factor: 2

selection:
  metric_path: train.losses.total.mean
  mode: min
  eps: 1.0e-8

preview:
  enabled: false
  split: val
  dataset_keys:
    - pv26_exhaustive_bdd100k_det_100k
    - pv26_exhaustive_aihub_traffic_seoul
    - pv26_exhaustive_aihub_obstacle_seoul
    - aihub_lane_seoul
  max_samples_per_dataset: 1
  write_overlay: false

phases:
  - name: head_warmup
    stage: stage_1_frozen_trunk_warmup
    min_epochs: 1
    max_epochs: 1
    patience: 1
    min_improvement_pct: 0.0
    overrides:
      batch_size: 2
      train_batches: 1
      val_batches: 0
      trunk_lr: 0.00005
      head_lr: 0.003

  - name: partial_unfreeze
    stage: stage_2_partial_unfreeze
    min_epochs: 1
    max_epochs: 1
    patience: 1
    min_improvement_pct: 0.0
    overrides:
      batch_size: 2
      train_batches: 1
      val_batches: 0
      trunk_lr: 0.00003
      head_lr: 0.0008

  - name: end_to_end_finetune
    stage: stage_3_end_to_end_finetune
    min_epochs: 1
    max_epochs: 1
    patience: 1
    min_improvement_pct: 0.0
    overrides:
      val_batches: 0
      trunk_lr: 0.00001
      head_lr: 0.0004
