# ===== USER CONFIG: PV26 TRAIN HYPERPARAMETERS =====
# PV26 메타트레인 preset 숫자 파라미터를 모아둔 파일이다.
# 경로는 user_paths.yaml에서 바꾸고, 여기서는 PV26 train 쪽 숫자/토글만 조절한다.

pv26_train:
  presets:
    default:
      preview:
        enabled: true
        split: val
        dataset_keys:
          - pv26_exhaustive_bdd100k_det_100k
          - pv26_exhaustive_aihub_traffic_seoul
          - pv26_exhaustive_aihub_obstacle_seoul
          - aihub_lane_seoul
        max_samples_per_dataset: 1
        write_overlay: true
      selection:
        metric_path: val.losses.total.mean
        mode: min
        eps: 1.0e-8
      train_defaults:
        device: cuda:0
        batch_size: 6
        train_batches: 48
        val_batches: 12
        trunk_lr: 1.0e-4
        head_lr: 5.0e-3
        weight_decay: 1.0e-4
        schedule: cosine
        amp: true
        accumulate_steps: 1
        grad_clip_norm: 5.0
        val_every: 1
        checkpoint_every: 1
        num_workers: 4
        pin_memory: true
        log_every_n_steps: 10
        profile_window: 10
        profile_device_sync: true
        encode_train_batches_in_loader: true
        encode_val_batches_in_loader: true
        persistent_workers: true
        prefetch_factor: 2
      phases:
        - name: head_warmup
          stage: stage_1_frozen_trunk_warmup
          min_epochs: 1
          max_epochs: 2
          patience: 1
          min_improvement_pct: 0.0
          overrides:
            trunk_lr: 5.0e-5
            head_lr: 3.0e-3
        - name: partial_unfreeze
          stage: stage_2_partial_unfreeze
          min_epochs: 1
          max_epochs: 2
          patience: 1
          min_improvement_pct: 0.0
          overrides:
            trunk_lr: 3.0e-5
            head_lr: 8.0e-4
        - name: end_to_end_finetune
          stage: stage_3_end_to_end_finetune
          min_epochs: 1
          max_epochs: 2
          patience: 1
          min_improvement_pct: 0.0
          overrides:
            trunk_lr: 1.0e-5
            head_lr: 4.0e-4
