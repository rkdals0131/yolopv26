# ===== USER CONFIG: PV26 TRAIN HYPERPARAMETERS =====
# PV26 메타트레인 preset 숫자 파라미터를 모아둔 파일이다.
# 경로는 user_paths.yaml에서 바꾸고, 여기서는 PV26 train 쪽 숫자/토글만 조절한다.

pv26_train:
  presets:
    default:
      preview:
        enabled: true
        split: val
        dataset_keys:
          - pv26_exhaustive_bdd100k_det_100k
          - pv26_exhaustive_aihub_traffic_seoul
          - pv26_exhaustive_aihub_obstacle_seoul
          - aihub_lane_seoul
        max_samples_per_dataset: 1
        write_overlay: true
      selection:
        metric_path: val.losses.total.mean
        mode: min
        eps: 1.0e-8
      train_defaults:
        device: cuda:0
        batch_size: 16
        train_batches: 1536
        val_batches: 256
        trunk_lr: 1.0e-4
        head_lr: 5.0e-3
        weight_decay: 1.0e-4
        schedule: cosine
        amp: true
        accumulate_steps: 1
        grad_clip_norm: 5.0
        checkpoint_every: 10
        num_workers: 6
        pin_memory: true
        log_every_n_steps: 20
        profile_window: 20
        profile_device_sync: true
        encode_train_batches_in_loader: true
        encode_val_batches_in_loader: true
        persistent_workers: true
        prefetch_factor: 2
        backbone_variant: s
        det_conf_threshold: 0.25
        det_iou_threshold: 0.70
        lane_obj_threshold: 0.50
        stop_line_obj_threshold: 0.50
        crosswalk_obj_threshold: 0.50
        sampler_ratios:
          bdd100k: 0.30
          aihub_traffic: 0.30
          aihub_lane: 0.25
          aihub_obstacle: 0.15
      phases:
        - name: head_warmup
          stage: stage_1_frozen_trunk_warmup
          min_epochs: 4
          max_epochs: 12
          patience: 2
          min_improvement_pct: 2.0
          overrides:
            batch_size: 32
            trunk_lr: 5.0e-5
            head_lr: 3.0e-3
        - name: partial_unfreeze
          stage: stage_2_partial_unfreeze
          min_epochs: 6
          max_epochs: 18
          patience: 2
          min_improvement_pct: 0.5
          overrides:
            batch_size: 24
            trunk_lr: 3.0e-5
            head_lr: 8.0e-4
        - name: end_to_end_finetune
          stage: stage_3_end_to_end_finetune
          min_epochs: 8
          max_epochs: 24
          patience: 3
          min_improvement_pct: 0.25
          overrides:
            batch_size: 16
            trunk_lr: 1.0e-5
            head_lr: 4.0e-4
        - name: lane_family_finetune
          stage: stage_4_lane_family_finetune
          min_epochs: 8
          max_epochs: 24
          patience: 3
          min_improvement_pct: 0.25
          selection:
            metric_path: val.metrics.lane_family.mean_f1
            mode: max
            eps: 1.0e-8
          loss_weights:
            det: 0.0
            tl_attr: 0.0
            lane: 1.5
            stop_line: 1.25
            crosswalk: 1.0
          freeze_policy: lane_family_heads_only
          overrides:
            batch_size: 32
            trunk_lr: 0.0
            head_lr: 2.0e-4
            sampler_ratios:
              bdd100k: 0.0
              aihub_traffic: 0.0
              aihub_lane: 1.0
              aihub_obstacle: 0.0
