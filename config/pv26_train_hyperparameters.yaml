# ===== USER CONFIG: PV26 TRAIN HYPERPARAMETERS =====
# PV26 메타트레인 preset 숫자 파라미터를 모아둔 파일이다.
# 경로는 user_paths.yaml에서 바꾸고, 여기서는 PV26 train 쪽 숫자/토글만 조절한다.

pv26_train:
  presets:
    default:
      preview:
        enabled: true
        split: val
        dataset_keys:
          - pv26_exhaustive_bdd100k_det_100k
          - pv26_exhaustive_aihub_traffic_seoul
          - pv26_exhaustive_aihub_obstacle_seoul
          - aihub_lane_seoul
        max_samples_per_dataset: 4
        write_overlay: true
        epoch_comparison_grid: true
        epoch_comparison_every_n_epochs: 1
        epoch_comparison_sample_count: 16
        epoch_comparison_columns: 4
      selection:
        metric_path: selection_metrics.phase_objective
        mode: max
        eps: 1.0e-8
      train_defaults:
        device: cuda:0
        batch_size: 4
        train_batches: -1
        val_batches: 512
        trunk_lr: 1.0e-4
        head_lr: 5.0e-3
        weight_decay: 1.0e-4
        schedule: cosine
        # 20260502 local run reached GradScaler scale 0.0 in phase 2/3.
        # Keep shipped long-run defaults in fp32 until AMP has a separate health gate.
        amp: false
        amp_init_scale: 1024.0
        accumulate_steps: 2
        grad_clip_norm: 5.0
        skip_non_finite_loss: true
        oom_guard: true
        multitask_conflict:
          enabled: true
          mode: pcgrad_style
          tasks:
            - det
            - tl_attr
            - lane
            - stop_line
            - crosswalk
        checkpoint_every: 10
        num_workers: 0
        pin_memory: false
        log_every_n_steps: 20
        profile_window: 20
        profile_device_sync: false
        encode_train_batches_in_loader: true
        encode_val_batches_in_loader: true
        persistent_workers: false
        prefetch_factor: null
        train_augmentation: true
        train_augmentation_seed: 26
        backbone_variant: s
        det_conf_threshold: 0.25
        det_iou_threshold: 0.70
        lane_obj_threshold: 0.50
        stop_line_obj_threshold: 0.50
        crosswalk_obj_threshold: 0.50
        allow_python_nms_fallback: false
        sampler_ratios:
          bdd100k: 0.30
          aihub_traffic: 0.30
          aihub_lane: 0.25
          aihub_obstacle: 0.15
        task_positive_task: multi:lane,stopline,crosswalk
        task_positive_fraction: 0.75
      phases:
        # Final local 8GB run: seg-first head stays in model code, while this file only
        # controls numeric/training knobs. Train uses the full merged train split;
        # validation stays bounded to keep every-epoch feedback practical.
        - name: head_warmup
          stage: stage_1_frozen_trunk_warmup
          min_epochs: 2
          max_epochs: 2
          patience: 1
          min_improvement_pct: 1.0
          min_delta_abs: 0.003
          overrides:
            batch_size: 4
            trunk_lr: 5.0e-5
            head_lr: 3.0e-3
        - name: partial_unfreeze
          stage: stage_2_partial_unfreeze
          min_epochs: 2
          max_epochs: 2
          patience: 1
          min_improvement_pct: 0.5
          min_delta_abs: 0.003
          overrides:
            batch_size: 4
            trunk_lr: 3.0e-5
            head_lr: 8.0e-4
        - name: end_to_end_finetune
          stage: stage_3_end_to_end_finetune
          min_epochs: 20
          max_epochs: 20
          patience: 1
          min_improvement_pct: 0.25
          min_delta_abs: 0.0025
          overrides:
            batch_size: 4
            trunk_lr: 1.0e-5
            head_lr: 4.0e-4
        - name: lane_family_finetune
          stage: stage_4_lane_family_finetune
          min_epochs: 20
          max_epochs: 20
          patience: 1
          min_improvement_pct: 0.25
          min_delta_abs: 0.002
          loss_weights:
            det: 0.0
            tl_attr: 0.0
            lane: 1.5
            stop_line: 1.25
            crosswalk: 1.0
          freeze_policy: lane_family_heads_only
          overrides:
            batch_size: 4
            trunk_lr: 0.0
            head_lr: 2.0e-4
            task_positive_task: multi:lane,stopline,crosswalk
            task_positive_fraction: 1.0
            sampler_ratios:
              bdd100k: 0.0
              aihub_traffic: 0.0
              aihub_lane: 1.0
              aihub_obstacle: 0.0
