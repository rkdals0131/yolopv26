# ===== USER CONFIG: PATHS =====
# 이 파일은 "어디에 원본이 있고, 어디에 결과를 쌓을지"만 조절한다.
# 출력 경로를 바꾸면 bootstrap 단계들 사이 연결도 같이 바뀌므로, 특별한 이유가 없으면 기본값 유지 권장.

od_bootstrap:
  raw_sources:
    bdd_root: seg_dataset/BDD100K
    bdd_images_root: seg_dataset/BDD100K/bdd100k_images_100k/100k
    bdd_labels_root: seg_dataset/BDD100K/bdd100k_labels/100k
    aihub_root: seg_dataset/AIHUB
    aihub_lane_root: null
    aihub_obstacle_root: null
    aihub_traffic_root: null
    aihub_docs_root: null

  outputs:
    bootstrap_root: seg_dataset/pv26_od_bootstrap
    teacher_dataset_root: seg_dataset/pv26_od_bootstrap/teacher_datasets
    exhaustive_od_root: seg_dataset/pv26_od_bootstrap/exhaustive_od
    final_dataset_root: seg_dataset/pv26_exhaustive_od_lane_dataset

  runs:
    train_root: runs/od_bootstrap/train
    eval_root: runs/od_bootstrap/eval
    calibration_root: runs/od_bootstrap/calibration/default
    exhaustive_run_root: runs/od_bootstrap

  calibration:
    # 필요하면 class policy template YAML 경로를 지정한다.
    # null이면 코드 기본 template를 사용한다.
    policy_template_path: null

pv26_train:
  dataset_root: seg_dataset/pv26_exhaustive_od_lane_dataset
  additional_roots: []
  run_root: runs/pv26_exhaustive_od_lane_train
  stress_run_root: runs/pv26_exhaustive_od_lane_train_stress
