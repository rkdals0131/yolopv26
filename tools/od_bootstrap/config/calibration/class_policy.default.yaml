run:
  output_root: ../../../../runs/od_bootstrap/calibration/default
  device: cuda:0
  imgsz: 640
  batch_size: 8
  predict_conf: 0.001
  predict_iou: 0.99

policy_template_path: ../sweep/class_policy.template.yaml

hard_negative:
  manifest_path: ../../../../runs/od_bootstrap/calibration/default/hard_negative_manifest.json
  top_k_per_class: 25
  focus_classes: [traffic_cone, obstacle]

search:
  match_iou: 0.5
  min_precision: 0.90
  score_thresholds: [0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60]
  nms_iou_thresholds: [0.40, 0.45, 0.50, 0.55]
  min_box_sizes: [4, 6, 8, 10, 12]

teachers:
  - name: mobility
    checkpoint_path: ../../../../runs/od_bootstrap/train/mobility/weights/best.pt
    model_version: mobility_yolov26s_bootstrap_v1
    dataset:
      root: ../../../../seg_dataset/pv26_od_bootstrap/teacher_datasets/mobility
      source_dataset_key: bdd100k_det_100k
      image_dir: images
      label_dir: labels
      split: val
    classes:
      - vehicle
      - bike
      - pedestrian

  - name: signal
    checkpoint_path: ../../../../runs/od_bootstrap/train/signal/weights/best.pt
    model_version: signal_yolov26s_bootstrap_v1
    dataset:
      root: ../../../../seg_dataset/pv26_od_bootstrap/teacher_datasets/signal
      source_dataset_key: aihub_traffic_seoul
      image_dir: images
      label_dir: labels
      split: val
    classes:
      - traffic_light
      - sign

  - name: obstacle
    checkpoint_path: ../../../../runs/od_bootstrap/train/obstacle/weights/best.pt
    model_version: obstacle_yolov26m_bootstrap_v1
    dataset:
      root: ../../../../seg_dataset/pv26_od_bootstrap/teacher_datasets/obstacle
      source_dataset_key: aihub_obstacle_seoul
      image_dir: images
      label_dir: labels
      split: val
    classes:
      - traffic_cone
      - obstacle
