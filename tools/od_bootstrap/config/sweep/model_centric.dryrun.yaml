run:
  output_root: ../../../../runs/od_bootstrap
  execution_mode: model-centric
  dry_run: true
  device: cuda:0
  imgsz: 640
  batch_size: 8
  predict_conf: 0.001
  predict_iou: 0.99

image_list:
  manifest_path: ../../../../seg_dataset/pv26_od_bootstrap/meta/bootstrap_image_list.jsonl

materialization:
  output_root: ../../../../seg_dataset/pv26_od_bootstrap/exhaustive_od
  copy_images: false

class_policy_path: ../../../../runs/od_bootstrap/calibration/default/class_policy.yaml

teachers:
  - name: mobility
    base_model: yolov26n
    checkpoint_path: ../../../../runs/od_bootstrap/train/mobility/weights/best.pt
    model_version: mobility_yolov26n_bootstrap_v1
    classes:
      - vehicle
      - bike
      - pedestrian

  - name: signal
    base_model: yolov26n
    checkpoint_path: ../../../../runs/od_bootstrap/train/signal/weights/best.pt
    model_version: signal_yolov26n_bootstrap_v1
    classes:
      - traffic_light
      - sign

  - name: obstacle
    base_model: yolov26n
    checkpoint_path: ../../../../runs/od_bootstrap/train/obstacle/weights/best.pt
    model_version: obstacle_yolov26n_bootstrap_v1
    classes:
      - traffic_cone
      - obstacle
