vehicle:
  score_threshold: 0.30
  nms_iou_threshold: 0.55
  min_box_size: 8

bike:
  score_threshold: 0.30
  nms_iou_threshold: 0.55
  min_box_size: 8

pedestrian:
  score_threshold: 0.35
  nms_iou_threshold: 0.50
  min_box_size: 8

traffic_light:
  score_threshold: 0.40
  nms_iou_threshold: 0.45
  min_box_size: 6
  allowed_source_datasets: [bdd100k_det_100k, aihub_traffic_seoul]
  suppress_with_classes: [sign]
  cross_class_iou_threshold: 0.35
  center_y_range: [0.00, 0.72]
  aspect_ratio_range: [0.20, 1.40]
  area_ratio_range: [0.00001, 0.05000]

sign:
  score_threshold: 0.40
  nms_iou_threshold: 0.50
  min_box_size: 8
  allowed_source_datasets: [bdd100k_det_100k, aihub_traffic_seoul]
  suppress_with_classes: [traffic_light]
  cross_class_iou_threshold: 0.35
  center_y_range: [0.00, 0.85]
  aspect_ratio_range: [0.35, 2.50]
  area_ratio_range: [0.00002, 0.12000]

traffic_cone:
  score_threshold: 0.45
  nms_iou_threshold: 0.45
  min_box_size: 8
  suppress_with_classes: [obstacle]
  cross_class_iou_threshold: 0.40
  center_y_range: [0.35, 1.00]
  aspect_ratio_range: [0.25, 1.60]
  area_ratio_range: [0.00002, 0.18000]

obstacle:
  score_threshold: 0.55
  nms_iou_threshold: 0.40
  min_box_size: 12
  suppress_with_classes: [traffic_cone]
  cross_class_iou_threshold: 0.40
  center_y_range: [0.25, 1.00]
  aspect_ratio_range: [0.20, 6.00]
  area_ratio_range: [0.00005, 0.45000]
