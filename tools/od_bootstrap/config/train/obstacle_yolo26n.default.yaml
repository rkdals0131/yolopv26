teacher_name: obstacle
run:
  output_root: ../../../../runs/od_bootstrap/train
  exist_ok: true
dataset:
  root: ../../../../seg_dataset/pv26_od_bootstrap/teacher_datasets/obstacle
  image_dir: images
  label_dir: labels
  train_split: train
  val_split: val
model:
  model_size: n
  weights: yolo26n.pt
  class_names:
    - traffic_cone
    - obstacle
train:
  epochs: 100
  imgsz: 640
  batch: 16
  device: cuda:0
  workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  patience: 50
  cache: false
  amp: true
  optimizer: auto
  seed: 0
  resume: false
  val: true
  save_period: 10
  log_every_n_steps: 20
  profile_window: 20
  profile_device_sync: true
